<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Superset Ops · Hotelogix</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d11;--bg2:#13131a;--bg3:#1c1c26;
  --sf:rgba(255,255,255,0.04);--sf2:rgba(255,255,255,0.07);--sf3:rgba(255,255,255,0.12);
  --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.16);
  --tx:#e8e8f0;--tx2:rgba(232,232,240,0.55);--tx3:rgba(232,232,240,0.3);
  --blue:#3b82f6;--bludk:#2563eb;--bluglow:rgba(59,130,246,0.22);
  --red:#f87171;--yel:#fbbf24;--grn:#34d399;--pur:#a78bfa;--cyn:#22d3ee;--org:#fb923c;
  --r:13px;--rsm:8px;--rxs:6px;
  --sh:0 0 0 1px rgba(255,255,255,0.06),0 8px 32px rgba(0,0,0,0.55);
  --shlg:0 0 0 1px rgba(255,255,255,0.08),0 24px 64px rgba(0,0,0,0.75);
  --mbg:#15151d;--tbg:#16161f;--cbg:rgba(255,255,255,0.025);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 45% at 10% 0%,rgba(37,99,235,0.14) 0%,transparent 65%),
             radial-gradient(ellipse 40% 40% at 90% 85%,rgba(167,139,250,0.08) 0%,transparent 65%),
             radial-gradient(ellipse 35% 30% at 55% 45%,rgba(34,211,238,0.04) 0%,transparent 65%)}
.wrap{position:relative;z-index:1;max-width:1420px;margin:0 auto;padding:0 26px}

/* HEADER */
header{padding:12px 0 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);margin-bottom:20px;gap:12px;position:sticky;top:0;background:rgba(13,13,17,0.9);backdrop-filter:blur(20px);z-index:50}
.hdl{display:flex;align-items:center;gap:14px}
.logo-img{height:36px;width:auto;object-fit:contain;mix-blend-mode:lighten;filter:brightness(1.15) contrast(1.1)}
.hddiv{width:1px;height:24px;background:var(--bd2);flex-shrink:0}
.anm{font-size:14px;font-weight:600;letter-spacing:-0.2px;line-height:1.2;color:var(--tx)}
.asm{font-size:11px;color:var(--tx3)}
.hdr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.avrow{display:flex}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:2px solid var(--bg);margin-left:-6px;cursor:pointer;transition:all 0.18s;flex-shrink:0}
.av:first-child{margin-left:0}.av:hover{transform:translateY(-2px);z-index:10}
.spill{display:flex;align-items:center;gap:5px;background:var(--sf);border:1px solid var(--bd);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--tx2);white-space:nowrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--grn);flex-shrink:0}
.sdot.syncing{background:var(--yel);animation:pulse 1s infinite}
.sdot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.25}}
.ibtn{background:var(--sf);border:1px solid var(--bd);color:var(--tx2);width:30px;height:30px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;font-size:13px;flex-shrink:0}
.ibtn:hover{background:var(--sf2);color:var(--tx);border-color:var(--bd2)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--rsm);border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.btn-p{background:var(--blue);color:#fff}.btn-p:hover{background:var(--bludk);box-shadow:0 4px 18px var(--bluglow);transform:translateY(-1px)}
.btn-g{background:var(--sf);border:1px solid var(--bd);color:var(--tx2)}.btn-g:hover{background:var(--sf2);color:var(--tx);border-color:var(--bd2)}
.btn-d{background:rgba(248,113,113,0.12);border:1px solid rgba(248,113,113,0.25);color:var(--red)}.btn-d:hover{background:rgba(248,113,113,0.22)}
.btn-s{background:rgba(52,211,153,0.12);border:1px solid rgba(52,211,153,0.25);color:var(--grn)}.btn-s:hover{background:rgba(52,211,153,0.22)}
.bsm{padding:5px 11px;font-size:12px;border-radius:var(--rxs)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* SPRINT BANNER */
.spbanner{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.spinfo{display:flex;align-items:center;gap:12px}
.splbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--tx3)}
.spname{font-size:13px;font-weight:600;color:var(--blue)}
.spdates{font-size:11px;color:var(--tx3)}
.spprog{flex:1;max-width:200px}
.spbar{height:4px;background:var(--sf2);border-radius:4px;overflow:hidden;margin-top:3px}
.spfill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--cyn));transition:width 0.5s}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px;transition:all 0.18s}
.sc:hover{background:var(--sf2);border-color:var(--bd2)}
.slbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;font-weight:600}
.sval{font-size:30px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.ssub{font-size:11px;color:var(--tx3);margin-top:3px}
.sbar{height:2px;border-radius:2px;margin-top:10px;background:rgba(255,255,255,0.06)}
.sfill{height:100%;border-radius:2px;transition:width 0.6s}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.tll{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.seg{display:flex;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:3px;gap:2px}
.segb{padding:4px 12px;border-radius:var(--rxs);border:none;background:transparent;color:var(--tx3);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s}
.segb.on{background:var(--bg3);color:var(--tx);border:1px solid var(--bd2);box-shadow:0 1px 4px rgba(0,0,0,0.5)}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif}
.chip.on{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,0.1)}
.chip:hover{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,0.08)}
.srch{display:flex;align-items:center;gap:7px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:5px 12px;transition:border-color 0.15s}
.srch:focus-within{border-color:var(--bd2)}
.srch input{background:transparent;border:none;outline:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;width:200px}
.srch input::placeholder{color:var(--tx3)}
.avfrow{display:flex;align-items:center;gap:4px}
.avf{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:all 0.15s;border:2px solid transparent;opacity:0.4}
.avf.on{opacity:1;border-color:rgba(255,255,255,0.6);transform:scale(1.1)}
.avf:hover{opacity:0.75}

/* KANBAN */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding-bottom:48px}
.board.hide{display:none}
.col{background:var(--cbg);border:1px solid var(--bd);border-radius:var(--r);padding:12px;min-height:520px}
.colhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.collbl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--tx2)}
.coldot{width:7px;height:7px;border-radius:50%}
.colcnt{background:var(--sf2);border-radius:20px;padding:1px 8px;font-size:10px;color:var(--tx3);font-weight:500}

/* TICKET */
.ticket{background:var(--tbg);border:1px solid var(--bd);border-radius:11px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden}
.ticket::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--tc,#3b82f6)}
.ticket:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh)}
.ticket.done-card{opacity:0.5}
.ticket.done-card .ttl{text-decoration:line-through;color:var(--tx3)}
.ttop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.tid{font-size:10px;color:var(--tx3);font-weight:600}
.prio{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600}
.ph{background:rgba(248,113,113,0.13);color:#f87171}
.pm{background:rgba(251,191,36,0.13);color:#fbbf24}
.pl{background:rgba(52,211,153,0.1);color:#34d399}
.ttl{font-size:13px;font-weight:500;line-height:1.38;margin-bottom:8px;color:var(--tx)}
.stgb{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px}
.depf{display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);color:#fbbf24;font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:4px;letter-spacing:0.4px}
.donef{display:inline-flex;align-items:center;gap:4px;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);color:#34d399;font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:4px}
.jiraf{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:4px;margin-left:4px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue);text-decoration:none;cursor:pointer}
.jiraf:hover{background:rgba(59,130,246,0.18)}
.ptrack{height:2px;background:rgba(255,255,255,0.05);border-radius:2px;margin-top:8px;overflow:hidden}
.pfill{height:100%;border-radius:2px;transition:width 0.4s}
.tfoot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.tav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.ecol{color:var(--tx3);font-size:12px;text-align:center;padding:28px 0;border:1px dashed var(--bd);border-radius:9px;margin-top:4px}

/* TABLE */
.tview{display:none;padding-bottom:48px}.tview.show{display:block}
.twrap{border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--sf);border-bottom:1px solid var(--bd)}
th{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:0.9px;padding:9px 14px;text-align:left}
tbody tr{border-bottom:1px solid var(--bd);transition:background 0.12s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sf)}
tbody tr.trdone{opacity:0.45}
td{padding:10px 14px;font-size:13px;vertical-align:middle}
.tdid{font-size:10px;color:var(--tx3);font-weight:600}

/* MODALS */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:var(--mbg);border:1px solid var(--bd2);border-radius:18px;width:600px;max-height:92vh;overflow-y:auto;padding:26px;position:relative;box-shadow:var(--shlg);animation:su 0.24s cubic-bezier(0.34,1.56,0.64,1)}
.modal-w{width:700px}
@keyframes su{from{opacity:0;transform:translateY(14px) scale(0.97)}to{opacity:1;transform:none}}
.mx{position:absolute;top:14px;right:14px;background:var(--sf);border:1px solid var(--bd);color:var(--tx3);width:27px;height:27px;border-radius:7px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.mx:hover{color:var(--tx);background:var(--sf2)}
.mttl{font-size:17px;font-weight:700;letter-spacing:-0.3px;margin-bottom:18px;color:var(--tx)}
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;display:block;font-weight:600}
.fi,.fs,.fta{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:8px 12px;color:var(--tx);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue)}
.fi::placeholder{color:var(--tx3)}
.fta{resize:vertical;min-height:68px}
.fs option{background:var(--mbg)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.stgsel{display:flex;flex-wrap:wrap;gap:5px}
.sopt{padding:4px 11px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--tx3);font-size:10px;font-weight:600;cursor:pointer;transition:all 0.12s;text-transform:uppercase;letter-spacing:0.5px;font-family:'Inter',sans-serif}
.dsbar{display:flex;margin:13px 0;gap:2px}
.dss{flex:1;padding:5px 2px;text-align:center;font-size:8px;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;opacity:0.25;border-radius:4px}
.dss.on{opacity:1}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:13px}
.di .dl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px;font-weight:600}
.di .dv{font-size:13px;font-weight:500}
.cmtlist{margin-top:8px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:5px}
.cmt{padding:8px 11px;background:var(--sf);border-radius:8px;font-size:12px;border:1px solid var(--bd)}
.cw{font-weight:600;color:var(--blue);font-size:11px;margin-bottom:2px;display:flex;justify-content:space-between}
.cts{color:var(--tx3);font-weight:400}
.crow{display:flex;gap:7px;margin-top:8px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.18);border-top-color:#fff;border-radius:50%;animation:sp 0.65s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* SETTINGS */
.ssec{margin-bottom:18px}
.ssect{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.9px;color:var(--tx3);margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.srow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.srow .fi{flex:1}
.cdot{width:26px;height:26px;border-radius:7px;border:1px solid var(--bd);cursor:pointer;padding:0;flex-shrink:0}
.delb{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.18);color:var(--red);width:25px;height:25px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;flex-shrink:0;transition:all 0.12s}
.delb:hover{background:rgba(248,113,113,0.2)}
.addb{font-size:12px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;padding:3px 0;display:flex;align-items:center;gap:4px;margin-top:3px}
.addb:hover{color:var(--tx)}

/* SPRINT CARDS */
.spc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rsm);padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.spc.active{border-color:var(--blue);background:rgba(59,130,246,0.06)}
.spci .sn{font-size:13px;font-weight:600;color:var(--tx)}
.spci .sd{font-size:11px;color:var(--tx3);margin-top:2px}

/* ACTIVITY */
.alli{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.alli:last-child{border-bottom:none}
.alldot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.allt{font-size:12px;color:var(--tx2)}
.allts{font-size:10px;color:var(--tx3);margin-top:1px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.ticket{animation:fi 0.18s ease}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1e1e2a;border:1px solid var(--bd2);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--tx);box-shadow:var(--shlg);opacity:0;transition:all 0.25s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="wrap">

<header>
  <div class="hdl">
    <img id="logo" class="logo-img" alt="Hotelogix">
    <div class="hddiv"></div>
    <div><div class="anm" id="anm">Superset Ops</div><div class="asm" id="asm">Data Team &middot; Dashboard Intelligence</div></div>
  </div>
  <div class="hdr">
    <div class="spill"><div class="sdot" id="sdot"></div><span id="slbl">Synced</span></div>
    <div class="avrow" id="avrow"></div>
    <div class="ibtn" id="btnAct" title="Activity log">&#128203;</div>
    <div class="ibtn" id="btnSpr" title="Sprints">&#127939;</div>
    <div class="ibtn" id="btnCfg" title="Settings">&#9881;</div>
    <button class="btn btn-p" id="btnNew">+ New Ticket</button>
  </div>
</header>

<div id="spbanner" style="display:none" class="spbanner">
  <div class="spinfo">
    <span class="splbl">Active Sprint</span>
    <span class="spname" id="spnm">—</span>
    <span class="spdates" id="spdt"></span>
  </div>
  <div class="spprog">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--tx3)"><span id="sppct">0%</span><span id="spcnt"></span></div>
    <div class="spbar"><div class="spfill" id="spfill" style="width:0%"></div></div>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="toolbar">
  <div class="tll">
    <div class="seg">
      <button class="segb on" id="btnK" onclick="setView('kanban')">&#11035; Kanban</button>
      <button class="segb" id="btnT" onclick="setView('table')">&#8801; Table</button>
    </div>
    <div class="chip on" id="chipAll" onclick="setF('all',this)">All</div>
    <div class="chip" onclick="setF('blocked',this)">&#128308; Blocked</div>
    <div class="chip" onclick="setF('high',this)">&#128293; High</div>
    <div class="chip" onclick="setF('done',this)">&#9989; Done</div>
    <div class="chip" id="mchip" style="display:none" onclick="setF('mine',this)">&#128100; Mine</div>
    <div class="avfrow" id="avfrow"></div>
  </div>
  <div style="display:flex;gap:7px;align-items:center">
    <button class="btn btn-g bsm" id="btnRef">&#8635;</button>
    <div class="srch"><span style="color:var(--tx3)">&#8981;</span><input type="text" placeholder="Search tickets, Jira IDs..." id="srch" oninput="renderAll()"></div>
  </div>
</div>

<div class="board" id="board"></div>
<div class="tview" id="tview">
  <div class="twrap">
    <table>
      <thead><tr><th>ID</th><th>Title</th><th>Assignee</th><th>Sprint</th><th>Stage</th><th>Priority</th><th>Type</th><th>Jira</th><th>Created</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- NEW TICKET -->
<div class="ov" id="ovNew">
<div class="modal">
  <div class="mx" id="mxNew">&#x2715;</div>
  <div class="mttl">&#10022; New Ticket</div>
  <div class="fg"><label class="fl">Title</label><input class="fi" id="ftitle" placeholder="e.g. Revenue dashboard — monthly SQL + YoY"></div>
  <div class="frow">
    <div class="fg"><label class="fl">Assignee</label><select class="fs" id="fassignee"></select></div>

let cfg=loadCfg(), tickets=[], sprints=[], activity=[], fMode='all', fAv='', selStg='';

function loadCfg(){try{const s=localStorage.getItem('hlx3');if(s)return Object.assign({},D,JSON.parse(s));}catch(e){}return Object.assign({},D);}
function saveCfg(){localStorage.setItem('hlx3',JSON.stringify(cfg));}

// SYNC
function ss(state){
  const d=document.getElementById('sdot'),l=document.getElementById('slbl');
  d.className='sdot'+(state==='ok'?'':(' '+state));
  l.textContent=state==='ok'?'Synced':state==='syncing'?'Syncing...':'Offline';
}
function apiFetch(params){
  ss('syncing');
  return new Promise((res,rej)=>{
    const cb='_cb'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(typeof v==='object'?JSON.stringify(v):String(v))).join('&');
    const url=cfg.apiUrl+'?'+qs+'&callback='+cb;
    let done=false;
    const timer=setTimeout(()=>{if(done)return;done=true;cleanup();ss('error');rej(new Error('Timeout — redeploy Apps Script'));},15000);
    function cleanup(){delete window[cb];const s=document.getElementById('_jss');if(s)s.remove();clearTimeout(timer);}
    window[cb]=function(data){if(done)return;done=true;cleanup();if(data&&data.error){ss('error');rej(new Error(data.error));return;}ss('ok');res(data);};
    const s=document.createElement('script');s.id='_jss';s.src=url;
    s.onerror=function(){if(done)return;done=true;cleanup();ss('error');rej(new Error('Network error — deploy Apps Script with "Anyone" access'));};
    document.head.appendChild(s);
  });
}
async function loadTickets(){
  if(!cfg.apiUrl)return;
  try{const d=await apiFetch({action:'getAll'});tickets=d.tickets||[];renderAll();}
  catch(e){toast('&#9888; '+e.message,4000);}
}

// HELPERS
function stgOf(id){return cfg.stages.find(s=>s.id===id)||{id:'todo',label:'To Do',color:'#6b7280'};}
function tmOf(name){return cfg.team.find(m=>m.name===name)||{name:name||'?',initials:(name||'?').slice(0,2).toUpperCase(),color:'#6b7280'};}
function pcls(p){return p==='High'?'ph':p==='Medium'?'pm':'pl';}
function actSpr(){return sprints.find(s=>s.active)||null;}

function getFiltered(){
  let list=[...tickets];
  const q=document.getElementById('srch').value.toLowerCase();
  if(q)list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.assignee||'').toLowerCase().includes(q)||(t.jiraId||'').toLowerCase().includes(q)||(t.id||'').toLowerCase().includes(q));
  if(fMode==='blocked')list=list.filter(t=>t.dep===true||t.dep==='true');
  if(fMode==='high')list=list.filter(t=>t.priority==='High');
  if(fMode==='done')list=list.filter(t=>t.stage==='done'||t.done===true||t.done==='true');
  if(fMode==='mine'&&cfg.myName)list=list.filter(t=>t.assignee===cfg.myName);
  if(fAv)list=list.filter(t=>t.assignee===fAv);
  return list;
}

function renderAll(){renderStats();renderSpBanner();renderKanban();renderTable();renderAvF();}

function renderStats(){
  const a=tickets,bl=a.filter(t=>t.dep===true||t.dep==='true').length,
    dn=a.filter(t=>t.stage==='done'||t.done===true||t.done==='true').length,
    hi=a.filter(t=>t.priority==='High'&&t.stage!=='done').length,
    ip=a.filter(t=>['sql','jinja','filter','debug'].includes(t.stage)).length,
    pct=a.length?Math.round(dn/a.length*100):0;
  const stats=[
    {l:'Total',  v:a.length, s:'All tickets',    c:'#3b82f6',p:100},
    {l:'Active', v:ip,       s:'In progress',    c:'#22d3ee',p:a.length?Math.round(ip/a.length*100):0},
    {l:'Blocked',v:bl,       s:'Waiting on dev', c:'#fbbf24',p:a.length?Math.round(bl/a.length*100):0},
    {l:'Critical',v:hi,      s:'High priority',  c:'#f87171',p:a.length?Math.round(hi/a.length*100):0},
    {l:'Done',   v:dn,       s:pct+'% complete', c:'#34d399',p:pct},
  ];
  document.getElementById('stats').innerHTML=stats.map(s=>'<div class="sc"><div class="slbl">'+s.l+'</div><div class="sval" style="color:'+s.c+'">'+s.v+'</div><div class="ssub">'+s.s+'</div><div class="sbar"><div class="sfill" style="width:'+s.p+'%;background:'+s.c+'"></div></div></div>').join('');
}

function renderSpBanner(){
  const as=actSpr(),b=document.getElementById('spbanner');
  if(!as){b.style.display='none';return;}
  b.style.display='flex';
  document.getElementById('spnm').textContent=as.name;
  const sd=as.start?new Date(as.start).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
  const ed=as.end?new Date(as.end).toLocaleDateString('en-IN',{day:'numeric',month:'short'}):'';
  document.getElementById('spdt').textContent=(sd&&ed)?sd+' → '+ed:'';
  const st=tickets.filter(t=>t.sprint===as.name),done=st.filter(t=>t.stage==='done'||t.done===true||t.done==='true').length;
  const pct=st.length?Math.round(done/st.length*100):0;
  document.getElementById('spfill').style.width=pct+'%';
  document.getElementById('sppct').textContent=pct+'%';
  document.getElementById('spcnt').textContent=done+'/'+st.length+' done';
}

function renderAvF(){
  document.getElementById('avfrow').innerHTML=cfg.team.map(m=>'<div class="avf'+(fAv===m.name?' on':'')+'" style="background:'+m.color+'22;color:'+m.color+'" title="'+m.name+'" data-name="'+m.name+'">'+m.initials+'</div>').join('');
  document.querySelectorAll('.avf').forEach(el=>el.addEventListener('click',function(){fAv=fAv===this.dataset.name?'':this.dataset.name;renderAll();}));
}

function buildCols(){
  const ids=cfg.stages.map(s=>s.id);
  const done=ids.filter(id=>id==='done'||id==='review');
  const dep=ids.filter(id=>id==='dep');
  const todo=ids.filter(id=>id==='todo');
  const wip=ids.filter(id=>!done.includes(id)&&!dep.includes(id)&&!todo.includes(id));
  return[
    {label:'Backlog',    stages:todo.length?todo:[ids[0]],color:'#6b7280'},
    {label:'In Progress',stages:wip,                      color:'#3b82f6'},
    {label:'Blocked',    stages:dep,                       color:'#fbbf24'},
    {label:'Done',       stages:done,                      color:'#34d399'},
  ];
}

function renderKanban(){
  const list=getFiltered(),cols=buildCols();
  document.getElementById('board').innerHTML=cols.map(col=>{
    const ct=list.filter(t=>col.stages.includes(t.stage));
    return '<div class="col"><div class="colhd"><div class="collbl"><div class="coldot" style="background:'+col.color+'"></div>'+col.label+'</div><div class="colcnt">'+ct.length+'</div></div>'+(ct.length?ct.map(tCard).join(''):'<div class="ecol">No tickets</div>')+'</div>';
  }).join('');
  document.querySelectorAll('.ticket').forEach(el=>el.addEventListener('click',function(){openDetail(this.dataset.id);}));
}

function tCard(t){
  const st=stgOf(t.stage),av=tmOf(t.assignee);
  const si=cfg.stages.findIndex(s=>s.id===t.stage);
  const prog=cfg.stages.length>1?Math.round(si/(cfg.stages.length-1)*100):0;
  const isB=t.dep===true||t.dep==='true';
  const isD=t.stage==='done'||t.done===true||t.done==='true';
  const jira=t.jiraId?'<a class="jiraf" href="'+(t.jiraUrl||'#')+'" target="_blank">&#11041; '+t.jiraId+'</a>':'';
  const spr=t.sprint?'<span style="font-size:9px;color:var(--tx3);margin-left:4px">&#127939; '+t.sprint+'</span>':'';
  return '<div class="ticket'+(isD?' done-card':'')+'" style="--tc:'+st.color+'" data-id="'+t.id+'">'
    +'<div class="ttop"><span class="tid">'+t.id+'</span><span class="prio '+pcls(t.priority)+'">'+t.priority+'</span></div>'
    +'<div class="ttl">'+t.title+'</div>'
    +'<span class="stgb" style="background:'+st.color+'18;color:'+st.color+'">'+st.label+'</span>'
    +(isD?'<span class="donef">&#10003; Done</span>':isB?'<span class="depf">&#8987; Dev Dep</span>':'')
    +jira+spr
    +'<div class="ptrack"><div class="pfill" style="width:'+prog+'%;background:'+st.color+'"></div></div>'
    +'<div class="tfoot"><span style="font-size:10px;color:var(--tx3)">'+(t.type||'')+'</span><div class="tav" style="background:'+av.color+'18;color:'+av.color+'">'+av.initials+'</div></div></div>';
}

function renderTable(){
  const list=getFiltered();
  document.getElementById('tbody').innerHTML=list.map(t=>{
    const st=stgOf(t.stage),av=tmOf(t.assignee);
    const isD=t.stage==='done'||t.done===true||t.done==='true';
    const jira=t.jiraId?'<a class="jiraf" href="'+(t.jiraUrl||'#')+'" target="_blank">'+t.jiraId+'</a>':'—';
    return '<tr class="'+(isD?'trdone':'')+'" data-id="'+t.id+'">'
      +'<td class="tdid">'+t.id+'</td><td style="max-width:240px;font-weight:500">'+t.title+'</td>'
      +'<td><div style="display:flex;align-items:center;gap:6px"><div class="tav" style="background:'+av.color+'18;color:'+av.color+'">'+av.initials+'</div>'+av.name+'</div></td>'
      +'<td style="font-size:11px;color:var(--tx3)">'+(t.sprint||'—')+'</td>'
      +'<td><span style="display:inline-flex;font-size:11px;font-weight:600;padding:2px 8px;border-radius:5px;background:'+st.color+'18;color:'+st.color+'">'+st.label+'</span></td>'
      +'<td><span class="prio '+pcls(t.priority)+'" style="padding:2px 9px;border-radius:5px;font-size:11px">'+t.priority+'</span></td>'
      +'<td style="font-size:11px;color:var(--tx3)">'+(t.type||'—')+'</td>'
      +'<td>'+jira+'</td>'
      +'<td style="font-size:11px;color:var(--tx3)">'+t.created+'</td></tr>';
  }).join('');
  document.querySelectorAll('#tbody tr').forEach(el=>el.addEventListener('click',function(){openDetail(this.dataset.id);}));
}

// VIEW / FILTER
function setView(v){
  document.getElementById('board').classList.toggle('hide',v!=='kanban');
  document.getElementById('tview').classList.toggle('show',v==='table');
  document.getElementById('btnK').classList.toggle('on',v==='kanban');
  document.getElementById('btnT').classList.toggle('on',v==='table');
}
function setF(f,el){
  fMode=f;fAv='';
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');renderAll();
}

// MODALS — pure JS, no querySelector tricks
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}

function openNewModal(){
  document.getElementById('fassignee').innerHTML=cfg.team.map(m=>'<option>'+m.name+'</option>').join('');
  document.getElementById('ftype').innerHTML=cfg.types.map(t=>'<option>'+t+'</option>').join('');
  document.getElementById('fsprint').innerHTML='<option value="">&#8212; No Sprint &#8212;</option>'+sprints.map(s=>'<option>'+s.name+'</option>').join('');
  const as=actSpr();if(as)document.getElementById('fsprint').value=as.name;
  selStg=cfg.stages[0]?cfg.stages[0].id:'todo';
  renderStgPills('stgsel',selStg);
  openOv('ovNew');
}

function renderStgPills(cid,activeId){
  document.getElementById(cid).innerHTML=cfg.stages.filter(s=>s.id!=='done').map(s=>'<div class="sopt" data-stg="'+s.id+'" style="color:'+s.color+';border-color:'+(activeId===s.id?s.color:'var(--bd)')+';background:'+(activeId===s.id?s.color+'18':'transparent')+'">'+s.label+'</div>').join('');
  document.querySelectorAll('#'+cid+' .sopt').forEach(el=>el.addEventListener('click',function(){
    selStg=this.dataset.stg;
    document.querySelectorAll('#'+cid+' .sopt').forEach(e=>{const s=cfg.stages.find(x=>x.id===e.dataset.stg);if(s){e.style.borderColor='var(--bd)';e.style.background='transparent';}});
    const s=cfg.stages.find(x=>x.id===selStg);
    if(s){this.style.borderColor=s.color;this.style.background=s.color+'18';}
  }));
}

async function createTicket(){
  const title=document.getElementById('ftitle').value.trim();
  if(!title){toast('&#9888; Please enter a title');return;}
  const btn=document.getElementById('btnCreate');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Saving...';
  const payload={action:'create',title,
    assignee:document.getElementById('fassignee').value,
    priority:document.getElementById('fpriority').value,
    type:document.getElementById('ftype').value,
    stage:selStg,
    desc:document.getElementById('fdesc').value,
    dep:document.getElementById('fdep').value==='true',
    jiraId:document.getElementById('fjiraid').value.trim(),
    jiraUrl:document.getElementById('fjiraurl').value.trim(),
    sprint:document.getElementById('fsprint').value,
    done:false};
  try{
    const d=await apiFetch(payload);
    tickets.unshift(d.ticket);
    logAct('Created '+d.ticket.id+': '+title,'#3b82f6');
    renderAll();closeOv('ovNew');
    ['ftitle','fdesc','fjiraid','fjiraurl'].forEach(x=>document.getElementById(x).value='');
    toast('&#10003; Ticket created');
  }catch(e){toast('&#10007; '+e.message,5000);}
  btn.disabled=false;btn.textContent='Create Ticket';
}

function openDetail(id){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  const st=stgOf(t.stage),av=tmOf(t.assignee);
  const si=cfg.stages.findIndex(s=>s.id===t.stage);
  const isB=t.dep===true||t.dep==='true';
  const isD=t.stage==='done'||t.done===true||t.done==='true';
  const comments=Array.isArray(t.comments)?t.comments:[];

  const dsbar=cfg.stages.map((s,i)=>'<div class="dss'+(i<=si?' on':'')+'" style="background:'+(i<=si?s.color+'28':'rgba(255,255,255,0.02)')+';color:'+s.color+'">'+s.label+'</div>').join('');
  const smove=cfg.stages.map(s=>'<div class="sopt" data-sid="'+s.id+'" data-sc="'+s.color+'" style="color:'+s.color+';border-color:'+(t.stage===s.id?s.color:'var(--bd)')+';background:'+(t.stage===s.id?s.color+'18':'transparent')+'">'+s.label+'</div>').join('');
  const cmtHtml=comments.length?comments.map(c=>'<div class="cmt"><div class="cw">'+c.who+'<span class="cts">'+(c.ts||'')+'</span></div>'+c.text+'</div>').join(''):'<div style="font-size:12px;color:var(--tx3);padding:5px 0">No comments yet</div>';
  const jiraB=t.jiraId?'<div class="di"><div class="dl">Jira</div><div class="dv"><a class="jiraf" href="'+(t.jiraUrl||'#')+'" target="_blank">&#11041; '+t.jiraId+'</a></div></div>':'';

  document.getElementById('detailContent').innerHTML=
    '<div class="mx" id="mxDet">&#x2715;</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    +'<span style="font-size:10px;color:var(--tx3);font-weight:600">'+t.id+'</span>'
    +'<div style="display:flex;gap:6px;align-items:center">'
    +(isD?'<button class="btn btn-d bsm" data-mkd="'+t.id+'" data-val="false">&#8617; Reopen</button>':'<button class="btn btn-s bsm" data-mkd="'+t.id+'" data-val="true">&#10003; Mark Done</button>')
    +'<span class="prio '+pcls(t.priority)+'" style="padding:2px 10px;border-radius:5px;font-size:11px">'+t.priority+'</span></div></div>'
    +'<div style="font-size:17px;font-weight:700;letter-spacing:-0.3px;line-height:1.35;margin-bottom:4px'+(isD?';text-decoration:line-through;color:var(--tx3)':'')+'">' +t.title+'</div>'
    +'<div class="dsbar">'+dsbar+'</div>'
    +(isB?'<div class="depf" style="margin-bottom:10px;display:inline-flex">&#8987; Blocked &#8212; Waiting on Dev</div>':'')
    +(isD?'<div class="donef" style="margin-bottom:10px;display:inline-flex">&#10003; Completed</div>':'')
    +'<div class="dg">'
    +'<div class="di"><div class="dl">Assignee</div><div class="dv" style="display:flex;align-items:center;gap:7px"><div class="tav" style="width:24px;height:24px;font-size:10px;background:'+av.color+'18;color:'+av.color+'">'+av.initials+'</div>'+av.name+'</div></div>'
    +'<div class="di"><div class="dl">Type</div><div class="dv">'+(t.type||'—')+'</div></div>'
    +'<div class="di"><div class="dl">Stage</div><div class="dv" style="color:'+st.color+'">'+st.label+'</div></div>'
    +'<div class="di"><div class="dl">Sprint</div><div class="dv">'+(t.sprint||'—')+'</div></div>'
    +'<div class="di"><div class="dl">Created</div><div class="dv">'+t.created+'</div></div>'
    +jiraB+'</div>'
    +'<div style="margin-top:13px"><div class="fl">Description</div><div style="font-size:13px;color:var(--tx2);line-height:1.6;background:var(--sf);border-radius:8px;padding:10px 12px;border:1px solid var(--bd)">'+(t.desc||'No description.')+'</div></div>'
    +'<div style="margin-top:13px"><div class="fl">Move Stage</div><div class="stgsel" id="stgmove">'+smove+'</div></div>'
    +'<div style="margin-top:13px"><div class="fl">Comments ('+comments.length+')</div><div class="cmtlist">'+cmtHtml+'</div>'
    +'<div class="crow"><select class="fs" id="cwho" style="width:130px;padding:7px 10px">'+cfg.team.map(m=>'<option>'+m.name+'</option>').join('')+'</select>'
    +'<input class="fi" id="ctext" placeholder="Add a comment..." style="flex:1"><button class="btn btn-p bsm" data-postcmt="'+t.id+'">Post</button></div></div>';

  openOv('ovDetail');

  // bind close
  document.getElementById('mxDet').onclick=function(){closeOv('ovDetail');};
  // bind mark done
  document.querySelectorAll('[data-mkd]').forEach(el=>el.addEventListener('click',function(){markDone(this.dataset.mkd,this.dataset.val==='true');}));
  // bind stage move
  document.querySelectorAll('#stgmove .sopt').forEach(el=>el.addEventListener('click',function(){moveStage(t.id,this.dataset.sid);}));
  // bind post comment
  document.querySelectorAll('[data-postcmt]').forEach(el=>el.addEventListener('click',function(){postComment(this.dataset.postcmt);}));
}

async function markDone(id,isDone){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  t.done=isDone;t.stage=isDone?'done':(t.stage==='done'?'review':t.stage);
  closeOv('ovDetail');renderAll();
  logAct((isDone?'&#10003; Closed: ':'&#8617; Reopened: ')+t.title,isDone?'#34d399':'#fbbf24');
  toast(isDone?'&#10003; Marked as done':'&#8617; Ticket reopened');
  try{await apiFetch({action:'update',id,stage:t.stage,done:String(isDone)});}catch(e){ss('error');toast('&#10007; Sync failed',4000);}
}

async function moveStage(id,stage){
  const t=tickets.find(x=>x.id===id);if(!t)return;
  t.stage=stage;t.dep=(stage==='dep');if(stage==='done')t.done=true;
  closeOv('ovDetail');renderAll();
  logAct('Stage → '+stage+': '+t.title,'#3b82f6');
  toast('Stage updated');
  try{await apiFetch({action:'update',id,stage,dep:String(t.dep),done:String(t.done||false)});}catch(e){ss('error');toast('&#10007; Sync failed',4000);}
}

async function postComment(id){
  const text=document.getElementById('ctext').value.trim();
  const who=document.getElementById('cwho').value;
  if(!text)return;
  const t=tickets.find(x=>x.id===id);if(!t)return;
  if(!Array.isArray(t.comments))t.comments=[];
  const ts=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  t.comments.push({who,text,ts});openDetail(id);
  try{await apiFetch({action:'comment',id,who,text});}catch(e){ss('error');}
}

// SPRINTS
function openSprintModal(){renderSpList();const n=new Date(),e=new Date();e.setDate(e.getDate()+14);document.getElementById('spstart').value=n.toISOString().slice(0,10);document.getElementById('spend').value=e.toISOString().slice(0,10);openOv('ovSprint');}
function renderSpList(){
  document.getElementById('splist').innerHTML=sprints.length
    ?sprints.map((s,i)=>'<div class="spc'+(s.active?' active':'')+'"><div class="spci"><div class="sn">'+s.name+(s.active?'<span style="font-size:10px;color:var(--blue);margin-left:6px">&#9679; Active</span>':'')+' </div><div class="sd">'+(s.start||'')+' → '+(s.end||'')+'</div></div><div style="display:flex;gap:6px">'+(s.active?'<button class="btn btn-g bsm" data-endspr="'+i+'">End</button>':'<button class="btn btn-p bsm" data-startspr="'+i+'">Activate</button>')+'<button class="btn btn-d bsm" data-delspr="'+i+'">&#x2715;</button></div></div>').join('')
    :'<div style="font-size:13px;color:var(--tx3);text-align:center;padding:16px 0">No sprints yet</div>';
  document.querySelectorAll('[data-startspr]').forEach(el=>el.addEventListener('click',function(){startSpr(+this.dataset.startspr);}));
  document.querySelectorAll('[data-endspr]').forEach(el=>el.addEventListener('click',function(){endSpr(+this.dataset.endspr);}));
  document.querySelectorAll('[data-delspr]').forEach(el=>el.addEventListener('click',function(){delSpr(+this.dataset.delspr);}));
}
function createSpr(){const n=document.getElementById('spname').value.trim();if(!n){toast('&#9888; Enter sprint name');return;}sprints.push({name:n,start:document.getElementById('spstart').value,end:document.getElementById('spend').value,active:false});saveSpr();renderSpList();renderAll();document.getElementById('spname').value='';toast('Sprint created');}
function startSpr(i){sprints.forEach(s=>s.active=false);sprints[i].active=true;saveSpr();renderSpList();renderAll();toast('Sprint activated');}
function endSpr(i){sprints[i].active=false;saveSpr();renderSpList();renderAll();toast('Sprint ended');}
function delSpr(i){sprints.splice(i,1);saveSpr();renderSpList();renderAll();}

// ACTIVITY
function openActModal(){
  document.getElementById('actlist').innerHTML=activity.length
    ?activity.map(a=>'<div class="alli"><div class="alldot" style="background:'+a.color+'"></div><div><div class="allt">'+a.msg+'</div><div class="allts">'+a.ts+'</div></div></div>').join('')
    :'<div style="font-size:13px;color:var(--tx3);text-align:center;padding:24px 0">No activity yet</div>';
  openOv('ovAct');
}

// SETTINGS
function openSettings(){
  document.getElementById('cfgname').value=cfg.appName;
  document.getElementById('cfgsub').value=cfg.appSub;
  document.getElementById('cfgurl').value=cfg.apiUrl||'';
  document.getElementById('cfgme').innerHTML=['— No filter —',...cfg.team.map(m=>m.name)].map(n=>'<option>'+n+'</option>').join('');
  document.getElementById('cfgme').value=cfg.myName||'— No filter —';
  renderTeamR();renderStgR();renderTypeR();openOv('ovCfg');
}
function renderTeamR(){document.getElementById('teamRows').innerHTML=cfg.team.map((m,i)=>'<div class="srow"><input class="fi" value="'+m.name+'" placeholder="Name" style="flex:1" data-ti="'+i+'" data-field="name"><input type="color" class="cdot" value="'+m.color+'" data-ci="'+i+'"><div class="delb" data-delt="'+i+'">&#x2715;</div></div>').join('');document.querySelectorAll('[data-ti]').forEach(el=>el.addEventListener('change',function(){cfg.team[+this.dataset.ti].name=this.value;cfg.team[+this.dataset.ti].initials=this.value.slice(0,2).toUpperCase();}));document.querySelectorAll('[data-ci]').forEach(el=>el.addEventListener('change',function(){cfg.team[+this.dataset.ci].color=this.value;}));document.querySelectorAll('[data-delt]').forEach(el=>el.addEventListener('click',function(){cfg.team.splice(+this.dataset.delt,1);renderTeamR();}));}
function renderStgR(){document.getElementById('stageRows').innerHTML=cfg.stages.map((s,i)=>'<div class="srow"><input class="fi" value="'+s.label+'" placeholder="Stage" style="flex:1" data-si="'+i+'"><input type="color" class="cdot" value="'+s.color+'" data-sci="'+i+'"><div class="delb" data-dels="'+i+'">&#x2715;</div></div>').join('');document.querySelectorAll('[data-si]').forEach(el=>el.addEventListener('change',function(){cfg.stages[+this.dataset.si].label=this.value;cfg.stages[+this.dataset.si].id=this.value.toLowerCase().replace(/\s+/g,'_');}));document.querySelectorAll('[data-sci]').forEach(el=>el.addEventListener('change',function(){cfg.stages[+this.dataset.sci].color=this.value;}));document.querySelectorAll('[data-dels]').forEach(el=>el.addEventListener('click',function(){cfg.stages.splice(+this.dataset.dels,1);renderStgR();}));}
function renderTypeR(){document.getElementById('typeRows').innerHTML=cfg.types.map((t,i)=>'<div class="srow"><input class="fi" value="'+t+'" style="flex:1" data-typi="'+i+'"><div class="delb" data-deltyp="'+i+'">&#x2715;</div></div>').join('');document.querySelectorAll('[data-typi]').forEach(el=>el.addEventListener('change',function(){cfg.types[+this.dataset.typi]=this.value;}));document.querySelectorAll('[data-deltyp]').forEach(el=>el.addEventListener('click',function(){cfg.types.splice(+this.dataset.deltyp,1);renderTypeR();}));}
function saveSettings(){
  cfg.appName=document.getElementById('cfgname').value||D.appName;
  cfg.appSub=document.getElementById('cfgsub').value||D.appSub;
  const u=document.getElementById('cfgurl').value.trim();if(u)cfg.apiUrl=u;
  const me=document.getElementById('cfgme').value;
  cfg.myName=me==='— No filter —'?'':me;
  document.getElementById('mchip').style.display=cfg.myName?'':'none';
  saveCfg();applyConfig();closeOv('ovCfg');renderAll();
  if(cfg.apiUrl)loadTickets();
  toast('Settings saved');
}

// TOAST
function toast(msg,dur){dur=dur||2200;const t=document.getElementById('toast');t.innerHTML=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}

// APPLY CONFIG
function applyConfig(){
  document.getElementById('anm').textContent=cfg.appName;
  document.getElementById('asm').textContent=cfg.appSub;
  document.title=cfg.appName+' · Hotelogix';
  document.getElementById('avrow').innerHTML=cfg.team.map(m=>'<div class="av" style="background:'+m.color+'20;color:'+m.color+'" title="'+m.name+'">'+m.initials+'</div>').join('');
  if(cfg.myName)document.getElementById('mchip').style.display='';
}

// WIRE STATIC BUTTONS — all via addEventListener, no inline onclick
document.getElementById('btnNew').addEventListener('click',openNewModal);
document.getElementById('btnRef').addEventListener('click',loadTickets);
document.getElementById('btnAct').addEventListener('click',openActModal);
document.getElementById('btnSpr').addEventListener('click',openSprintModal);
document.getElementById('btnCfg').addEventListener('click',openSettings);
document.getElementById('btnCreate').addEventListener('click',createTicket);
document.getElementById('btnCrSp').addEventListener('click',createSpr);
document.getElementById('btnSaveCfg').addEventListener('click',saveSettings);
document.getElementById('btnCancelCfg').addEventListener('click',function(){closeOv('ovCfg');});
document.getElementById('btnAddTeam').addEventListener('click',function(){cfg.team.push({name:'New',initials:'NW',color:'#6b7280'});renderTeamR();});
document.getElementById('btnAddStg').addEventListener('click',function(){cfg.stages.push({id:'stg'+Date.now(),label:'New Stage',color:'#6b7280'});renderStgR();});
document.getElementById('btnAddType').addEventListener('click',function(){cfg.types.push('New Type');renderTypeR();});

// Close X buttons
document.getElementById('mxNew').addEventListener('click',function(){closeOv('ovNew');});
document.getElementById('mxSpr').addEventListener('click',function(){closeOv('ovSprint');});
document.getElementById('mxAct').addEventListener('click',function(){closeOv('ovAct');});
document.getElementById('mxCfg').addEventListener('click',function(){closeOv('ovCfg');});

// Close overlay on backdrop click
['ovNew','ovDetail','ovSprint','ovAct','ovCfg'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeOv(id);});
});

// INIT
document.getElementById('logo').src=LOGO_SRC;
sprints=loadSpr();
activity=loadAct();
applyConfig();
renderAll();
if(cfg.apiUrl)loadTickets();
setInterval(function(){if(cfg.apiUrl)loadTickets();},60000);
</script>
